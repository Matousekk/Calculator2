<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="display"></div>
        <button class="clear">AC</button>
        <button class="operator divide">/</button>
        <button class="nmb number7">7</button>
        <button class="nmb number8">8</button>
        <button class="nmb number9">9</button>
        <button class="operator multiply">*</button>
        <button class="nmb number4">4</button>
        <button class="nmb number5">5</button>
        <button class="nmb number6">6</button>
        <button class="operator substract">-</button>
        <button class="nmb number1">1</button>
        <button class="nmb number2">2</button>
        <button class="nmb number3">3</button>
        <button class="operator add">+</button>
        <button class="nmb number0">0</button>
        <button class="decimal">.</button>
        <button class="result">=</button>
    </div>


    <script src="script.js"></script>
</body>
</html>
